name: Package Production

on:
  workflow_run:
    workflows: ["Release Production", "Hotfix Production"]
    types:
      - completed

jobs:
  build-and-package:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Get Tag Name
        id: get_tag
        run: |
          git fetch --tags --force

          TAG_NAME=$(git tag -l 'rel-*' | sort -V | tail -n1)

          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${{ github.event.workflow_run.head_branch }}"
          fi

          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
      - name: Generate zip package
        run: |
          npx bestzip "${{ steps.get_tag.outputs.tag }}.zip" src/ package.json package-lock.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_tag.outputs.tag }}
          path: ${{ steps.get_tag.outputs.tag }}.zip
