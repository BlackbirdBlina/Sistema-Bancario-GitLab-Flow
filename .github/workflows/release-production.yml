name: Release Production

on:
  pull_request:
    types: [closed]
    branches: [production]

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'staging'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Calculate next release tag
        id: rel
        run: |
          git fetch --tags --force

          latest=$(git tag -l 'rel-*' | grep -E '^rel-[0-9]+\.[0-9]+$' | sort -V | tail -n1)

          if [ -z "$latest" ]; then
            next="rel-1.0"
          else
            ver=${latest#rel-} # X.Y
            major=${ver%.*}    # X
            minor=${ver#*.}    # Y
            next="rel-${major}.$((minor + 1))"
          fi

          echo "Latest release found: ${latest:-<nenhuma>}"
          echo "Next release: $next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          TAG="${{ steps.rel.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
